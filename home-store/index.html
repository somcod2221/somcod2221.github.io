<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوسام ستور | متجر المنتجات المنزلية المتنوعة</title>
<meta name="description" content="الوسام ستور — متجرك الأول للمنتجات المنزلية المتنوعة: أدوات المطبخ، الأثاث، الخزائن، الكراسي، مستلزمات المنزل وأكثر.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0e6f5c;--teal-2:#0a5547;--teal-soft:#13836c;
  --gold:#f8b400;--gold-2:#e09e00;
  --ink:#17302c;--muted:#6b7c79;--red:#d8232a;
  --paper:#fff;--mist:#f1f4f3;--line:#e6ecea;
  --shadow:0 10px 30px rgba(14,111,92,.10);--shadow-lg:0 24px 60px rgba(10,60,50,.18);
  --r:16px;--maxw:1240px;
  --head:'Tajawal',system-ui,sans-serif;--body:'Cairo',system-ui,sans-serif;
}
html[lang="en"]{--head:'Poppins',sans-serif;--body:'Poppins',sans-serif;}
html[data-theme="dark"]{--paper:#0f1c1a;--mist:#13201e;--ink:#eaf3f1;--muted:#9bb0ac;--line:#1f322e;--shadow:0 10px 30px rgba(0,0,0,.4);--shadow-lg:0 24px 60px rgba(0,0,0,.55);}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.7;overflow-x:hidden;transition:background .35s,color .35s}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px}
h1,h2,h3{font-family:var(--head);line-height:1.25}
::selection{background:var(--gold);color:#15302b}

/* ===== ANNOUNCE (marquee) ===== */
.announce{background:linear-gradient(90deg,var(--teal-2),var(--teal),var(--teal-soft));color:#fff;overflow:hidden;white-space:nowrap;padding:7px 0;font-size:13px;font-weight:700}
.announce .track{display:inline-block;padding-left:100%;animation:marq 22s linear infinite}
html[dir="ltr"] .announce .track{padding-left:0;padding-right:100%}
.announce:hover .track{animation-play-state:paused}
.announce b{color:var(--gold)}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-100%)}}
html[dir="ltr"] .announce .track{animation-name:marqL}
@keyframes marqL{from{transform:translateX(0)}to{transform:translateX(100%)}}

/* ===== HEADER (compact, one row) ===== */
header{position:sticky;top:0;z-index:60;background:color-mix(in srgb,var(--paper) 90%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);transition:box-shadow .3s,background .35s}
header.scrolled{box-shadow:0 6px 22px rgba(0,0,0,.07)}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0}
.hdr-side{display:flex;align-items:center;gap:3px}
.icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--ink);position:relative;transition:.22s}
.icon-btn:hover{background:var(--mist);color:var(--teal)}
.icon-btn svg{width:19px;height:19px}
.lang-btn{min-width:38px;height:36px;padding:0 9px;border-radius:10px;display:grid;place-items:center;font-family:var(--head);font-weight:800;font-size:13px;color:var(--teal);border:1.5px solid var(--line);transition:.22s}
.lang-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.cart-badge{position:absolute;top:1px;left:1px;min-width:16px;height:16px;padding:0 3px;background:var(--gold);color:#15302b;border-radius:20px;font-size:10px;font-weight:800;display:grid;place-items:center;font-family:var(--body);transform:scale(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
html[dir="ltr"] .cart-badge{left:auto;right:1px}
.cart-badge.show{transform:scale(1)}
.logo{display:flex;align-items:center;gap:8px;flex-direction:row-reverse}
html[dir="ltr"] .logo{flex-direction:row}
.logo .mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(150deg,var(--teal),var(--teal-soft));display:grid;place-items:center;box-shadow:0 5px 12px rgba(14,111,92,.3);flex-shrink:0}
.logo .mark svg{width:21px;height:21px}
.logo .txt{display:flex;flex-direction:column;line-height:1}
.logo .ar{font-family:var(--head);font-weight:900;font-size:16px;color:var(--teal)}
.logo .ar b{color:var(--gold)}
.logo .en{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1.8px;margin-top:2px}

/* ===== HERO ===== */
.hero{padding:16px 0 4px}
.carousel{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lg)}
.slides{display:flex;transition:transform .55s cubic-bezier(.65,0,.35,1)}
.slide{min-width:100%;position:relative;display:grid;align-items:center;min-height:330px;background:linear-gradient(120deg,var(--teal-2),var(--teal) 55%,var(--teal-soft))}
.slide-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.slide-ov{position:absolute;inset:0;z-index:1;background:linear-gradient(105deg,rgba(8,50,42,.74) 6%,rgba(10,70,58,.42) 42%,rgba(10,60,50,.08) 100%)}
html[dir="ltr"] .slide-ov{background:linear-gradient(255deg,rgba(8,50,42,.74) 6%,rgba(10,70,58,.42) 42%,rgba(10,60,50,.08) 100%)}
.slide-copy{position:relative;z-index:2;padding:44px 50px;max-width:560px;color:#fff}
.eyebrow{font-family:var(--head);font-weight:800;letter-spacing:5px;font-size:11px;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.slide-copy h2{font-size:clamp(26px,4.6vw,42px);font-weight:900;margin-bottom:10px;text-shadow:0 2px 16px rgba(0,0,0,.25)}
.slide-copy h2 em{font-style:normal;color:var(--gold)}
.slide-copy p{font-size:15.5px;opacity:.95;max-width:420px;margin-bottom:20px}
.btn-gold{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#15302b;font-family:var(--head);font-weight:800;font-size:15px;padding:12px 28px;border-radius:50px;box-shadow:0 10px 24px rgba(248,180,0,.4);transition:.25s}
.btn-gold:hover{transform:translateY(-3px);box-shadow:0 16px 30px rgba(248,180,0,.5)}
.btn-gold svg{width:17px;height:17px}
.trust{position:relative;z-index:2;display:flex;flex-wrap:wrap;gap:7px 22px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.2)}
.trust div{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#fff}
.trust svg{width:16px;height:16px;color:var(--gold)}
.dots{position:absolute;bottom:14px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:5}
.dots button{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.5);transition:.3s}
.dots button.active{background:var(--gold);width:26px;border-radius:6px}
.c-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);display:grid;place-items:center;color:#fff;transition:.25s}
.c-arrow:hover{background:var(--gold);color:#15302b}
.c-arrow.prev{right:12px}.c-arrow.next{left:12px}
html[dir="ltr"] .c-arrow.prev{right:auto;left:12px}html[dir="ltr"] .c-arrow.next{left:auto;right:12px}
.c-arrow svg{width:19px;height:19px}

/* ===== SECTIONS ===== */
.sec{padding:40px 0}
.sec-sm{padding:30px 0}
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.sec-title h2{font-size:clamp(20px,3.4vw,28px);font-weight:900;color:var(--ink)}
.sec-title span{display:block;width:64px;height:4px;border-radius:6px;margin-top:8px;background:linear-gradient(90deg,var(--gold),var(--teal))}
html[dir="ltr"] .sec-title span{background:linear-gradient(90deg,var(--teal),var(--gold))}
.more-link{font-family:var(--head);font-weight:800;font-size:14px;color:var(--teal);display:inline-flex;align-items:center;gap:5px;transition:.2s}
.more-link:hover{color:var(--gold-2);gap:9px}
.more-link svg{width:15px;height:15px}
.btn-more{background:var(--gold);color:#15302b;font-family:var(--head);font-weight:800;font-size:14px;padding:9px 22px;border-radius:11px;transition:.25s;box-shadow:0 8px 18px rgba(248,180,0,.28)}
.btn-more:hover{background:var(--gold-2);transform:translateY(-2px)}

/* ===== CATEGORIES (compact) ===== */
.cats{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
.cat{background:var(--mist);border-radius:13px;padding:13px 6px;text-align:center;border:1px solid var(--line);transition:.3s;cursor:pointer}
.cat:hover{transform:translateY(-5px);box-shadow:var(--shadow);border-color:transparent}
.cat .ic{width:42px;height:42px;border-radius:12px;margin:0 auto 8px;display:grid;place-items:center;background:linear-gradient(150deg,var(--teal),var(--teal-soft));color:#fff;box-shadow:0 5px 12px rgba(14,111,92,.22)}
.cat:nth-child(even) .ic{background:linear-gradient(150deg,var(--gold),var(--gold-2));color:#15302b}
.cat .ic svg{width:21px;height:21px}
.cat b{font-family:var(--head);font-weight:700;font-size:12px;display:block;line-height:1.3}

/* ===== CARD ===== */
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:.32s;position:relative}
.card:hover{transform:translateY(-7px);box-shadow:var(--shadow-lg);border-color:transparent}
.tag{position:absolute;top:10px;right:10px;z-index:3;background:var(--red);color:#fff;font-family:var(--head);font-weight:800;font-size:11px;padding:4px 9px;border-radius:7px}
html[dir="ltr"] .tag{right:auto;left:10px}
.tag.best{background:var(--teal);right:auto;left:10px}
html[dir="ltr"] .tag.best{left:auto;right:10px}
.pimg{position:relative;aspect-ratio:1/1;background:var(--mist);overflow:hidden}
.pimg img{width:100%;height:100%;object-fit:cover;transition:.5s}
.card:hover .pimg img{transform:scale(1.07)}
.pimg.broken::after{content:var(--ph,'🛍️');position:absolute;inset:0;display:grid;place-items:center;font-size:54px;background:linear-gradient(150deg,var(--teal),var(--teal-soft))}
.fav{position:absolute;bottom:10px;left:10px;z-index:3;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);display:grid;place-items:center;color:var(--teal);transition:.25s;box-shadow:0 4px 10px rgba(0,0,0,.12)}
html[dir="ltr"] .fav{left:auto;right:10px}
.fav:hover,.fav.on{background:var(--red);color:#fff}
.fav svg{width:17px;height:17px}
.card-body{padding:13px 13px 0;flex:1;display:flex;flex-direction:column}
.card-body h3{font-family:var(--head);font-weight:700;font-size:14px;color:var(--ink);min-height:40px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rate{display:flex;align-items:center;gap:4px;margin:5px 0 8px;color:var(--gold);font-size:12px}
.rate span{color:var(--muted);font-size:11px}
.price{display:flex;align-items:baseline;gap:8px;margin-top:auto;flex-wrap:wrap;padding-bottom:12px}
.price .now{font-family:var(--head);font-weight:900;font-size:17px;color:var(--red)}
.price .now.plain{color:var(--teal)}
.price .old{font-size:13px;color:var(--muted);text-decoration:line-through}
.add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--gold);color:#15302b;font-family:var(--head);font-weight:800;font-size:14px;padding:12px;transition:.25s}
.add:hover{background:var(--gold-2)}
.add svg{width:17px;height:17px}
.add.done{background:var(--teal);color:#fff}

/* ===== GRID ===== */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}

/* ===== RAIL (auto-scroll single row) ===== */
.rail{display:flex;gap:14px;overflow-x:auto;padding:4px 2px 14px;scroll-snap-type:x mandatory;scrollbar-width:thin;scrollbar-color:var(--teal) transparent}
.rail::-webkit-scrollbar{height:6px}
.rail::-webkit-scrollbar-thumb{background:var(--teal);border-radius:6px}
.rail .card{min-width:215px;max-width:215px;scroll-snap-align:start}

/* ===== MARQUEE (best sellers) ===== */
.marquee{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent)}
.mq-track{display:flex;gap:16px;width:max-content;animation:scrollx 38s linear infinite}
.marquee:hover .mq-track{animation-play-state:paused}
.mq-track .card{min-width:220px;max-width:220px}
@keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ===== PROMO ===== */
.promo{position:relative;border-radius:24px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;align-items:center;background:var(--mist);min-height:280px;box-shadow:var(--shadow)}
.promo.flip{direction:ltr}
.promo .pcopy{padding:42px;direction:inherit}
.promo.flip .pcopy{direction:rtl}
html[dir="ltr"] .promo .pcopy{direction:ltr}
.promo .pcopy h3{font-size:clamp(22px,3.4vw,32px);font-weight:900;color:var(--teal);margin-bottom:9px}
.promo .pcopy p{color:var(--muted);font-size:15px;margin-bottom:20px;max-width:350px}
.promo .pimgb{height:100%;min-height:280px;position:relative;overflow:hidden}
.promo .pimgb img{width:100%;height:100%;object-fit:cover}
.btn-outline{display:inline-flex;align-items:center;gap:8px;border:2px solid var(--teal);color:var(--teal);font-family:var(--head);font-weight:800;padding:10px 24px;border-radius:50px;transition:.25s;background:var(--paper)}
.btn-outline:hover{background:var(--teal);color:#fff}
.btn-outline svg{width:15px;height:15px}

/* ===== DELIVERY BANNER ===== */
.deliver{position:relative;border-radius:24px;overflow:hidden;background:linear-gradient(120deg,var(--teal-2),var(--teal) 60%,var(--teal-soft));color:#fff;display:flex;align-items:center;justify-content:space-between;gap:22px;padding:32px 38px;flex-wrap:wrap;box-shadow:var(--shadow)}
.deliver::before{content:"";position:absolute;inset:0;opacity:.14;background:radial-gradient(circle at 12% 130%,#fff 0,transparent 45%)}
.deliver .d-left{position:relative;z-index:2;display:flex;align-items:center;gap:18px}
.deliver .d-ic{width:62px;height:62px;border-radius:18px;background:rgba(255,255,255,.14);display:grid;place-items:center;color:var(--gold);flex-shrink:0}
.deliver .d-ic svg{width:33px;height:33px}
.deliver h3{font-size:clamp(20px,3vw,27px);font-weight:900;margin-bottom:4px}
.deliver p{opacity:.9;font-size:14.5px;max-width:440px}
.deliver .d-btn{position:relative;z-index:2;display:inline-flex;align-items:center;gap:10px;background:#25d366;color:#fff;font-family:var(--head);font-weight:800;font-size:16px;padding:14px 30px;border-radius:50px;box-shadow:0 10px 24px rgba(37,211,102,.4);transition:.25s;white-space:nowrap}
.deliver .d-btn:hover{transform:translateY(-3px);box-shadow:0 16px 30px rgba(37,211,102,.55)}
.deliver .d-btn svg{width:22px;height:22px}
@media(max-width:600px){.deliver{padding:26px 22px;justify-content:center}.deliver .d-left{flex-direction:column;text-align:center}.deliver p{margin:0 auto}}

/* ===== LOCATION / MAP ===== */
.locsec{display:grid;grid-template-columns:1.15fr 1fr;border-radius:24px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--paper)}
.locsec .map{position:relative;min-height:360px}
.locsec .map iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.locsec .loc-info{padding:34px}
.loc-row{display:flex;gap:14px;margin-bottom:20px}
.loc-row .li-ic{width:46px;height:46px;border-radius:13px;background:var(--mist);color:var(--teal);display:grid;place-items:center;flex-shrink:0}
.loc-row .li-ic svg{width:22px;height:22px}
.loc-row b{display:block;font-family:var(--head);font-weight:800;font-size:15px;color:var(--ink);margin-bottom:2px}
.loc-row span{color:var(--muted);font-size:14px;line-height:1.6}
.loc-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
.btn-teal{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;font-family:var(--head);font-weight:800;font-size:14px;padding:11px 22px;border-radius:50px;transition:.25s}
.btn-teal:hover{background:var(--teal-2);transform:translateY(-2px)}
.btn-teal svg{width:16px;height:16px}
@media(max-width:780px){.locsec{grid-template-columns:1fr}.locsec .map{min-height:260px;order:2}}

/* ===== WHY ===== */
.why{background:linear-gradient(120deg,var(--teal-2),var(--teal));color:#fff}
.why .feats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.feat{text-align:center;padding:8px}
.feat .fic{width:60px;height:60px;margin:0 auto 12px;border-radius:18px;display:grid;place-items:center;background:rgba(255,255,255,.12);color:var(--gold)}
.feat .fic svg{width:29px;height:29px}
.feat h4{font-family:var(--head);font-weight:800;font-size:17px;margin-bottom:5px}
.feat p{font-size:13.5px;opacity:.85}

/* ===== NEWSLETTER ===== */
.news-band{background:var(--mist);border-radius:24px;padding:40px;text-align:center;border:1px solid var(--line)}
.news-band h3{font-size:24px;font-weight:900;color:var(--teal);margin-bottom:7px}
.news-band p{color:var(--muted);margin-bottom:20px}
.news-form{display:flex;gap:10px;max-width:500px;margin:0 auto}
.news-form input{flex:1;border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:12px;padding:13px 16px;font-family:var(--body);font-size:15px;outline:none}
.news-form input:focus{border-color:var(--teal)}
.news-form button{background:var(--teal);color:#fff;font-family:var(--head);font-weight:800;padding:0 28px;border-radius:12px;transition:.25s}
.news-form button:hover{background:var(--teal-2)}

/* ===== FOOTER ===== */
footer{background:linear-gradient(160deg,var(--teal),var(--teal-2));color:#fff;margin-top:54px}
.foot-grid{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:34px;padding:50px 0 26px}
.foot-brand .logo .ar{color:#fff}.foot-brand .logo .ar b{color:var(--gold)}
.foot-brand .logo .en{color:rgba(255,255,255,.7)}
.foot-brand p{margin:16px 0;opacity:.85;font-size:14px;max-width:330px}
.socials{display:flex;gap:9px}
.socials a{width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);display:grid;place-items:center;transition:.25s}
.socials a:hover{background:var(--gold);border-color:var(--gold);color:#15302b;transform:translateY(-3px)}
.socials svg{width:18px;height:18px}
.foot-col h4{font-family:var(--head);font-size:16px;margin-bottom:14px;position:relative;padding-bottom:9px}
.foot-col h4::after{content:"";position:absolute;bottom:0;right:0;width:38px;height:3px;border-radius:4px;background:var(--gold)}
html[dir="ltr"] .foot-col h4::after{right:auto;left:0}
.foot-col ul{list-style:none}
.foot-col li{margin-bottom:10px}
.foot-col a{opacity:.85;font-size:14px;transition:.2s}
.foot-col a:hover{opacity:1;color:var(--gold)}
.foot-bar{border-top:1px solid rgba(255,255,255,.15);padding:16px 0;text-align:center;font-size:13px;opacity:.85}
.foot-bar b{color:var(--gold)}

/* ===== FABs ===== */
.fab-stack{position:fixed;bottom:20px;left:20px;z-index:80;display:flex;flex-direction:column;gap:12px}
html[dir="ltr"] .fab-stack{left:auto;right:20px}
.fab{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;box-shadow:0 10px 24px rgba(0,0,0,.25);transition:transform .25s}
.fab:hover{transform:scale(1.08)}
.fab svg{width:29px;height:29px;color:#fff}
.fab.wa{background:#25d366;animation:pulse 2.4s infinite}
.fab.call{background:var(--teal)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.5)}70%{box-shadow:0 0 0 15px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
.totop{position:fixed;bottom:20px;right:20px;z-index:80;width:46px;height:46px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s;transform:translateY(12px)}
html[dir="ltr"] .totop{right:auto;left:20px}
.totop.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.totop svg{width:20px;height:20px}

/* ===== DRAWERS ===== */
.overlay{position:fixed;inset:0;background:rgba(8,30,26,.5);backdrop-filter:blur(3px);z-index:90;opacity:0;pointer-events:none;transition:.35s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer,.mnav{position:fixed;top:0;left:0;height:100%;background:var(--paper);z-index:95;transform:translateX(-100%);transition:transform .4s cubic-bezier(.65,0,.35,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
html[dir="ltr"] .drawer,html[dir="ltr"] .mnav{left:auto;right:0;transform:translateX(100%)}
.drawer{width:390px;max-width:90vw}
.mnav{width:340px;max-width:88vw;overflow-y:auto}
.drawer.show,.mnav.show{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px;border-bottom:1px solid var(--line)}
.drawer-head h3{font-size:19px;font-weight:900;color:var(--teal)}
.drawer-head button,.mnav-top button{width:36px;height:36px;border-radius:10px;background:var(--mist);color:var(--ink);display:grid;place-items:center}
.drawer-head svg{width:19px;height:19px}
.drawer-body{flex:1;overflow-y:auto;padding:14px}
.empty-cart{text-align:center;padding:54px 18px;color:var(--muted)}
.empty-cart svg{width:64px;height:64px;color:var(--line);margin-bottom:12px}
.ci{display:flex;gap:11px;padding:11px;border:1px solid var(--line);border-radius:13px;margin-bottom:11px;align-items:center}
.ci-img{width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--mist)}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-info h4{font-family:var(--head);font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{color:var(--red);font-weight:800;font-size:13.5px;font-family:var(--head)}
.qty{display:flex;align-items:center;gap:8px;margin-top:5px}
.qty button{width:25px;height:25px;border-radius:7px;background:var(--mist);color:var(--ink);font-weight:800;display:grid;place-items:center;font-size:15px}
.qty span{font-weight:800;min-width:16px;text-align:center}
.ci-del{color:var(--muted);margin-right:auto}
html[dir="ltr"] .ci-del{margin-right:0;margin-left:auto}
.ci-del:hover{color:var(--red)}
.ci-del svg{width:17px;height:17px}
.drawer-foot{padding:16px 18px;border-top:1px solid var(--line)}
.drawer-foot .row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13.5px;color:var(--muted)}
.drawer-foot .total{font-size:19px;font-weight:900;color:var(--ink);font-family:var(--head)}
.drawer-foot .total b{color:var(--teal)}
.checkout{width:100%;background:var(--gold);color:#15302b;font-family:var(--head);font-weight:800;font-size:15px;padding:14px;border-radius:12px;margin-top:12px;transition:.25s}
.checkout:hover{background:var(--gold-2)}
.btn-back{width:100%;background:transparent;border:2px solid var(--line);color:var(--ink);font-family:var(--head);font-weight:800;font-size:14px;padding:12px;border-radius:12px;margin-top:9px;transition:.25s}
.btn-back:hover{border-color:var(--teal);color:var(--teal)}
.mnav-top{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.mnav-social{display:flex;gap:9px;padding:16px;flex-wrap:wrap;justify-content:center}
.mnav-social a{width:42px;height:42px;border-radius:50%;background:var(--gold);color:#15302b;display:grid;place-items:center;transition:.25s}
.mnav-social a:hover{transform:translateY(-3px)}
.mnav-social svg{width:19px;height:19px}
.mnav-links{padding:6px 0;flex:1}
.mnav-links a{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;font-family:var(--head);font-weight:700;font-size:15px;border-bottom:1px solid var(--line);transition:.2s}
.mnav-links a:hover{background:var(--mist);color:var(--teal)}
.mnav-links a svg{width:16px;height:16px;color:var(--muted)}
.mnav-foot{padding:16px;display:grid;gap:5px}
.mnav-foot button{display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:11px;font-family:var(--head);font-weight:700;font-size:14.5px;color:var(--ink);transition:.2s;text-align:start}
.mnav-foot button:hover{background:var(--mist)}
.mnav-foot button svg{width:21px;height:21px;color:var(--teal)}

/* ===== CATEGORY VIEW ===== */
.catview{position:fixed;inset:0;z-index:100;background:var(--paper);transform:translateY(100%);transition:transform .42s cubic-bezier(.65,0,.35,1);display:flex;flex-direction:column;visibility:hidden}
.catview.show{transform:translateY(0);visibility:visible}
.catview-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:color-mix(in srgb,var(--paper) 92%,transparent);backdrop-filter:blur(12px);z-index:2}
.catview-head h2{font-family:var(--head);font-weight:900;font-size:clamp(18px,4vw,24px);color:var(--teal)}
.catview-head h2 small{display:block;font-family:var(--body);font-weight:600;font-size:12px;color:var(--muted)}
.catview-head .back{display:flex;align-items:center;gap:7px;font-family:var(--head);font-weight:800;font-size:14px;color:var(--ink);background:var(--mist);padding:9px 16px;border-radius:11px;transition:.2s}
.catview-head .back:hover{background:var(--teal);color:#fff}
.catview-head .back svg{width:17px;height:17px}
html[dir="ltr"] .catview-head .back svg{transform:scaleX(-1)}
.catview-body{flex:1;overflow-y:auto;padding:20px 16px 60px}
.catview-body .grid{max-width:var(--maxw);margin:0 auto}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:28px;left:50%;translate:-50% 30px;z-index:120;background:var(--teal);color:#fff;padding:12px 22px;border-radius:50px;font-family:var(--head);font-weight:700;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.35s;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;translate:-50% 0}
.toast svg{width:19px;height:19px;color:var(--gold)}

.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s,transform .7s}
.reveal.in{opacity:1;transform:none}

@media(max-width:1024px){.cats{grid-template-columns:repeat(6,1fr)}.grid{grid-template-columns:repeat(3,1fr)}.why .feats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:780px){.slide-copy{padding:30px 26px}.promo,.promo.flip{grid-template-columns:1fr;direction:rtl}html[dir="ltr"] .promo,html[dir="ltr"] .promo.flip{direction:ltr}.promo .pimgb{min-height:200px;order:2}.foot-grid{grid-template-columns:1fr;gap:26px}}
@media(max-width:600px){.cats{grid-template-columns:repeat(4,1fr)}.grid{grid-template-columns:repeat(2,1fr)}.why .feats{grid-template-columns:1fr 1fr}.news-form{flex-direction:column}.logo .en{display:none}.sec,.sec-sm{padding:30px 0}.rail .card,.mq-track .card{min-width:180px;max-width:180px}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}.reveal{opacity:1;transform:none}}
</style>

 if(!p)return;
 if(p.classList.contains('pimg')){p.classList.add('broken');p.style.setProperty('--ph',"'"+(img.dataset.ph||'🛍️')+"'");img.remove();}
 else if(p.classList.contains('slide')){img.remove();}
 else{p.style.cssText+='display:grid;place-items:center;background:linear-gradient(150deg,var(--teal),var(--teal-soft))';p.innerHTML='<span style="font-size:54px">'+(img.dataset.ph||'🛍️')+'</span>';}
}

/* ===== render helpers ===== */
function name(p){return LANG==='ar'?p.a:p.e}
function cardHTML(p,id){
 const old=p.o?`<span class="old">${sdg(p.o)}</span>`:'';
 const tag=p.o?`<span class="tag">-${Math.round((1-p.u/p.o)*100)}%</span>`:'';
 return `<article class="card">${tag}
  <div class="pimg"><img src="${p.img}" alt="${name(p)}" loading="lazy" data-ph="${p.ph}" onerror="brk(this)">
   <button class="fav" onclick="this.classList.toggle('on');toast(this.classList.contains('on')?t('t_fav_on'):t('t_fav_off'))" aria-label="fav"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 21s-7-4.5-9.5-9A5 5 0 0 1 12 6a5 5 0 0 1 9.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg></button>
  </div>
  <div class="card-body"><h3>${name(p)}</h3>
   <div class="rate">★★★★★ <span>(${p.r} ${t('reviews')})</span></div>
   <div class="price"><span class="now ${p.o?'':'plain'}">${sdg(p.u)}</span>${old}</div>
  </div>
  <button class="add" onclick='addCart(${JSON.stringify({a:p.a,e:p.e,u:p.u,img:p.img,ph:p.ph,id:id})},this)'>
   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/><path d="M2 3h3l2.5 12h11l2-8H6"/></svg>${t('add')}</button>
 </article>`;
}
function renderProducts(){
 Object.keys(P).forEach(sec=>{
  const el=document.getElementById('grid-'+sec)||document.getElementById('rail-'+sec);
  if(el)el.innerHTML=P[sec].map((p,i)=>cardHTML(p,sec+'-'+i)).join('');
 });
 // best sellers rail
 document.getElementById('rail-best').innerHTML=best.map((p,i)=>cardHTML(p,'best-'+i)).join('');
}
function renderCats(){
 document.getElementById('cats').innerHTML=cats.map((c,idx)=>
  `<div class="cat" onclick="openCat(${idx})"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${c.i}</svg></div><b>${LANG==='ar'?c.a:c.e}</b></div>`).join('');
}
let curCat=null;
function openCat(idx){
 curCat=idx;
 document.getElementById('catTitle').innerHTML=`${LANG==='ar'?cats[idx].a:cats[idx].e}<small>${CATD[idx].length} ${LANG==='ar'?'منتج':'products'}</small>`;
 document.getElementById('catGrid').innerHTML=catItems(idx).map((p,i)=>cardHTML(p,'cat'+idx+'-'+i)).join('');
 document.getElementById('catView').classList.add('show');
 document.querySelector('.catview-body').scrollTop=0;
 lock(1);
}
function closeCat(){curCat=null;document.getElementById('catView').classList.remove('show');lock(0);}
function renderSlides(){
 document.getElementById('slides').innerHTML=slides.map(s=>{
  const eb=s.eb||(LANG==='ar'?s.eb_ar:s.eb_en);
  const h=LANG==='ar'?s.h_ar:s.h_en;const pp=LANG==='ar'?s.p_ar:s.p_en;
  const trust=s.trust?`<div class="trust">
    <div><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6z"/></svg>${LANG==='ar'?'جودة عالية':'Top quality'}</div>
    <div><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 11 12 3l9 8v9H3z"/></svg>${LANG==='ar'?'لكل منزل':'For every home'}</div>
    <div><svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="7" width="18" height="13" rx="2"/></svg>${LANG==='ar'?'باقات ذكية':'Smart bundles'}</div>
    <div><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6z"/></svg>${LANG==='ar'?'موثوق وآمن':'Safe & trusted'}</div>
   </div>`:'';
  return `<div class="slide">
   <img class="slide-bg" src="${s.img}" alt="" data-ph="${s.ph}" onerror="brk(this)">
   <div class="slide-ov"></div>
   <div class="slide-copy"><div class="eyebrow">${eb}</div><h2>${h}</h2><p>${pp}</p>
    <a href="${s.href}" class="btn-gold">${t('shop')}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></a>
    ${trust}</div></div>`;
 }).join('');
 buildDots();go(cur,true);
}
function renderStatic(){
 document.getElementById('announce').innerHTML=t('announce').repeat(2);
 document.querySelectorAll('[data-i]').forEach(el=>el.innerHTML=t(el.dataset.i));
 document.querySelectorAll('[data-iph]').forEach(el=>el.placeholder=t(el.dataset.iph));
 document.getElementById('logoName').innerHTML=LANG==='ar'?'الوسام <b>ستور</b>':'Al <b>Wisam</b>';
 document.getElementById('fcol1').innerHTML=I[LANG].fc1.map(x=>`<li><a href="#">${x}</a></li>`).join('');
 document.getElementById('fcol2').innerHTML=I[LANG].fc2.map(x=>`<li><a href="#">${x}</a></li>`).join('');
 document.getElementById('mnavLinks').innerHTML=I[LANG].nav.map(x=>`<a href="#" onclick="closeAll();toast('${x}')">${x}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg></a>`).join('');
 document.getElementById('langBtn').textContent=LANG==='ar'?'EN':'ع';
 document.getElementById('delivLink').href='https://wa.me/249965160505?text='+encodeURIComponent(t('deliv_msg'));
}
function renderAll(){renderStatic();renderCats();renderSlides();renderProducts();renderCart();if(curCat!==null)openCat(curCat);}

/* ===== language ===== */
function switchLang(){
 LANG=LANG==='ar'?'en':'ar';
 document.documentElement.lang=LANG;
 document.documentElement.dir=LANG==='ar'?'rtl':'ltr';
 renderAll();
}

/* ===== cart ===== */
let cart=[];
function addCart(p,btn){
 const ex=cart.find(i=>i.id===p.id);
 if(ex)ex.q++;else cart.push({...p,q:1});
 renderCart();
 if(btn){btn.classList.add('done');btn.textContent=t('t_added');
  setTimeout(()=>{btn.classList.remove('done');btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/><path d="M2 3h3l2.5 12h11l2-8H6"/></svg>'+t('add');},1100);}
 toast(t('t_addcart'));
}
function changeQ(id,d){const it=cart.find(i=>i.id===id);if(!it)return;it.q+=d;if(it.q<=0)cart=cart.filter(i=>i.id!==id);renderCart();}
function delItem(id){cart=cart.filter(i=>i.id!==id);renderCart();}
function renderCart(){
 const n=cart.reduce((s,i)=>s+i.q,0);
 const b=document.getElementById('cartBadge');b.textContent=n;b.classList.toggle('show',n>0);
 const body=document.getElementById('cartBody'),foot=document.getElementById('cartFoot');
 if(!cart.length){body.innerHTML=`<div class="empty-cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/><path d="M2 3h3l2.5 12h11l2-8H6"/></svg><p>${t('cart_empty')}</p></div>`;foot.style.display='none';return;}
 body.innerHTML=cart.map(i=>`<div class="ci"><div class="ci-img"><img src="${i.img}" alt="" data-ph="${i.ph}" onerror="brk(this)"></div>
  <div class="ci-info"><h4>${LANG==='ar'?i.a:i.e}</h4><div class="ci-price">${sdg(i.u*i.q)}</div>
   <div class="qty"><button onclick="changeQ('${i.id}',1)">+</button><span>${i.q}</span><button onclick="changeQ('${i.id}',-1)">−</button></div></div>
  <button class="ci-del" onclick="delItem('${i.id}')" aria-label="del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div>`).join('');
 const total=cart.reduce((s,i)=>s+i.u*i.q,0);
 document.getElementById('subTotal').textContent=sdg(total);
 document.getElementById('grandTotal').textContent=sdg(total);
 foot.style.display='block';
}

/* ===== drawers ===== */
const ov=document.getElementById('overlay');
function openCart(){closeAll();document.getElementById('drawer').classList.add('show');ov.classList.add('show');lock(1)}
function openMenu(){closeAll();document.getElementById('mnav').classList.add('show');ov.classList.add('show');lock(1)}
function closeAll(){document.getElementById('drawer').classList.remove('show');document.getElementById('mnav').classList.remove('show');ov.classList.remove('show');lock(0)}
function lock(s){document.body.style.overflow=s?'hidden':''}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeAll();closeCat();}});

/* ===== carousel (fast) ===== */
let cur=0;const dotsEl=document.getElementById('dots');const SP=3000;
function buildDots(){dotsEl.innerHTML='';slides.forEach((_,i)=>{const d=document.createElement('button');d.onclick=()=>{go(i);reset()};dotsEl.appendChild(d)})}
function go(i,silent){cur=(i+slides.length)%slides.length;document.getElementById('slides').style.transform=`translateX(${(LANG==='ar'?1:-1)*cur*100}%)`;[...dotsEl.children].forEach((d,x)=>d.classList.toggle('active',x===cur))}
function move(d){go(cur+d);reset()}
let timer=setInterval(()=>go(cur+1),SP);
function reset(){clearInterval(timer);timer=setInterval(()=>go(cur+1),SP)}

/* ===== rails auto-scroll ===== */
function autoRail(el){
 setInterval(()=>{
  if(!el||el.matches(':hover'))return;
  const max=el.scrollWidth-el.clientWidth;
  const sl=Math.abs(el.scrollLeft);
  if(sl>=max-6)el.scrollTo({left:0,behavior:'smooth'});
  else el.scrollBy({left:(document.documentElement.dir==='rtl'?-1:1)*230,behavior:'smooth'});
 },3000);
}

/* ===== theme/toast/misc ===== */
function toggleTheme(){const h=document.documentElement;const dk=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',dk?'light':'dark');toast(dk?t('t_day'):t('t_night'));}
let tt;function toast(m){document.getElementById('toastMsg').textContent=m;const x=document.getElementById('toast');x.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>x.classList.remove('show'),2500);}
function checkout(){
 if(!cart.length){toast(t('cart_empty'));return;}
 const lines=cart.map((i,n)=>`${n+1}. ${LANG==='ar'?i.a:i.e} ×${i.q}`).join('\n');
 const msg=t('order_head')+'\n'+lines;
 window.open('https://wa.me/249965160505?text='+encodeURIComponent(msg),'_blank');
 toast(t('t_checkout'));
}
function subscribe(){const e=document.getElementById('newsEmail');if(e.value&&e.value.includes('@')){toast(t('t_sub_ok'));e.value='';}else toast(t('t_sub_bad'));}

const header=document.getElementById('header'),totop=document.getElementById('totop');
addEventListener('scroll',()=>{header.classList.toggle('scrolled',scrollY>10);totop.classList.toggle('show',scrollY>500)});
const io=new IntersectionObserver(en=>en.forEach(x=>{if(x.isIntersecting){x.target.classList.add('in');io.unobserve(x.target)}}),{threshold:.1});

/* ===== init ===== */
renderAll();
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
autoRail(document.getElementById('rail-best'));
autoRail(document.getElementById('rail-discounts'));
autoRail(document.getElementById('rail-packages'));
</script>
